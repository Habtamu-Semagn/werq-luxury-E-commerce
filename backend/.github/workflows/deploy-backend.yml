name: Deploy Backend
on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Check
        working-directory: ./backend
        run: |
          npm install
          docker build -t werq-backend .

      - name: Trigger Render Deploy
        if: success()
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
